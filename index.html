<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Taquilla Integral - Teatro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 5px; }
        .config-bar { background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; font-weight: bold; }
        select { padding: 8px; font-size: 14px; border-radius: 6px; border: 1px solid #cbd5e1; font-weight: bold; color: #1e293b; }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { background: none; border: none; padding: 10px 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: #64748b; flex: 1; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .counter-box { background: #2563eb; color: white; padding: 15px; border-radius: 8px; font-size: 22px; font-weight: bold; margin: 15px 0; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #e2e8f0; margin-bottom: 15px; }
        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .input-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 60%; }
        input[type="number"] { width: 25%; }
        button { padding: 12px 20px; background: #16a34a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #15803d; }
        .btn-camera { background: #4f46e5; width: 100%; margin-bottom: 15px; padding: 15px; font-size: 18px; }
        .btn-sync { background: #2563eb; width: 100%; padding: 12px; font-size: 16px; margin-bottom: 10px; }
        #status { padding: 15px; border-radius: 6px; font-weight: bold; margin-top: 15px; display: none; font-size: 18px; }
        .success { background-color: #dcfce7; color: #15803d; border: 2px solid #16a34a; }
        .danger { background-color: #fee2e2; color: #b91c1c; border: 2px solid #ef4444; }
        .loading { background-color: #fef08a; color: #a16207; border: 2px solid #eab308; }
        .history-list { text-align: left; background: #f8fafc; padding: 10px; border-radius: 6px; max-height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #cbd5e1; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #e2e8f0; font-size: 15px; }
        .history-item:nth-child(even) { background-color: #f1f5f9; }
        .btn-reset { background: #64748b; margin-top: 25px; width: 100%; }
        #qr-output { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; }
        .qr-card { border: 2px dashed #cbd5e1; padding: 15px; border-radius: 8px; background: #ffffff; display: flex; flex-direction: column; align-items: center; width: 220px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 Control de Teatro Cloud (v5.0)</h1>
    
    <div class="config-bar">
        🎬 Sala Activa: 
        <select id="funcion-activa" onchange="cambiarFuncionSecura()">
            <option value="FUNCIÓN 1">FUNCIÓN 1</option>
            <option value="FUNCIÓN 2">FUNCIÓN 2</option>
        </select>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-generador')">🎟️ Crear</button>
        <button class="tab-btn" onclick="switchTab('tab-escaner')">📷 Escáner</button>
        <button class="tab-btn" onclick="switchTab('tab-asistencia')">📊 Dentro (<span id="tab-count-badge">0</span>)</button>
    </div>

    <!-- PESTAÑA 1: GENERADOR -->
    <div id="tab-generador" class="tab-content active">
        <h3>Generador de Boletos por Lote</h3>
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="qr-prefix" placeholder="Ej: OBRALUNES" autocomplete="off">
                <input type="number" id="qr-quantity" min="1" max="500" value="156">
            </div>
            <button style="width: 100%;" onclick="generarLoteBoletos()">⚡ Generar Todos los Boletos</button>
        </div>
        <div id="qr-output" style="display:none;"></div>
    </div>

    <!-- PESTAÑA 2: ESCÁNER -->
    <div id="tab-escaner" class="tab-content">
        <div class="counter-box">Asistentes en Sala: <span id="total-count">0</span></div>
        <button class="btn-camera" id="btn-encender-camara" onclick="inicializarEscaner()">📷 Activar Cámara Súper-Foco</button>
        <div id="reader"></div>
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="ticket-input" placeholder="Código manual o Token..." autocomplete="off">
                <button onclick="procesarBoletoManual()">Ingresar</button>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <!-- PESTAÑA 3: ASISTENCIA GLOBAL -->
    <div id="tab-asistencia" class="tab-content">
        <h3>👥 Personas Adentro (Sincronizado)</h3>
        <button class="btn-sync" onclick="sincronizarConNube()">🔄 Sincronizar Lista Cloud (Compu/Cel)</button>
        <div class="history-list" id="history-container"></div>
        <button class="btn-reset" onclick="reiniciarTodoCloud()">🧹 Limpiar Pruebas de esta Función</button>
    </div>
</div>

<script>
    // ==========================================
    // ¡PEGA TU URL DE APPS SCRIPT AQUÍ ABAJO! (LÍNEA 110)
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxQEIDQ0VNsKB6TtqtuKhI3l6m8pVpw09J43n4aE2XukAFY6IaQ2BQ7jwC0RyTlzbxGiA/exec";

    let funcionActual = document.getElementById('funcion-activa').value;
    let boletosRegistrados = new Set();
    sincronizarConNube();

    function cambiarFuncionSecura() {
        funcionActual = document.getElementById('funcion-activa').value;
        boletosRegistrados.clear();
        document.getElementById('status').style.display = "none";
        sincronizarConNube();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'tab-asistencia') sincronizarConNube();
        if (tabId !== 'tab-escaner' && window.html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => console.log(err));
            document.getElementById('btn-encender-camara').style.display = "block";
        }
    }

    function desencriptarToken(token) {
        try {
            let decodificado = atob(token.trim());
            if(decodificado.startsWith("TEATRO-SECURE:")) return decodificado.replace("TEATRO-SECURE:", "");
            return token.toUpperCase();
        } catch(e) { return token.toUpperCase(); }
    }

    function extraerNumero(codigo) {
        let coincidencia = codigo.match(/\d+$/);
        return coincidencia ? parseInt(coincidencia[0], 10) : null;
    }

    function registrarBoleto(codigoBruto) {
        let codigoReal = desencriptarToken(codigoBruto);
        let numBoleto = extraerNumero(codigoReal);
        const statusDiv = document.getElementById('status');
        
        switchTab('tab-escaner');
        statusDiv.className = "loading"; statusDiv.style.display = "block";
        statusDiv.innerHTML = `⏳ Analizando boleto [${codigoReal}]...`;

        // VALIDACIÓN DE RANGO GLOBAL 001 - 156
        if (!numBoleto || numBoleto < 1 || numBoleto > 156) {
            statusDiv.className = "danger";
            statusDiv.innerHTML = `❌ Código Inválido: [${codigoReal}] no es uno de los boletos impresos (001-156).`;
            reproducirSonidoError(); return;
        }

        // VALIDACIÓN DE ASIGNACIÓN POR FUNCIÓN
        if (funcionActual === "FUNCIÓN 1" && numBoleto > 78) {
            statusDiv.className = "danger";
            statusDiv.innerHTML = `⚠️ ¡Función Equivocada! El boleto [${codigoReal}] pertenece a la FUNCIÓN 2.`;
            reproducirSonidoError(); return;
        }
        if (funcionActual === "FUNCIÓN 2" && numBoleto <= 78) {
            statusDiv.className = "danger";
            statusDiv.innerHTML = `⚠️ ¡Función Equivocada! El boleto [${codigoReal}] pertenece a la FUNCIÓN 1.`;
            reproducirSonidoError(); return;
        }

        if (boletosRegistrados.has(String(numBoleto).padStart(3, '0'))) {
            statusDiv.className = "danger";
            statusDiv.innerHTML = `⚠️ ¡REPETIDO! El boleto [${codigoReal}] ya ingresó previamente.`;
            reproducirSonidoError(); return;
        }

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accion: "registrar", codigo: codigoReal, funcion: funcionActual })
        }).then(() => {
            statusDiv.className = "success";
            statusDiv.innerHTML = `✅ ¡Validado con éxito! Boleto [${codigoReal}] registrado en la lista oficial.`;
            sincronizarConNube();
        }).catch(() => {
            statusDiv.className = "danger";
            statusDiv.innerHTML = `❌ Error crítico de red. Verifica internet.`;
        });
    }

    function sincronizarConNube() {
        const badge = document.getElementById('tab-count-badge');
        badge.innerText = "...";
        
        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ accion: "obtener_asistencia", funcion: funcionActual })
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "success") {
                boletosRegistrados = new Set(res.lista);
                actualizarInterfazTaquilla();
            }
        }).catch(() => {
            badge.innerText = boletosRegistrados.size;
        });
    }

    function actualizarInterfazTaquilla() {
        let total = boletosRegistrados.size;
        document.getElementById('total-count').innerText = total;
        document.getElementById('tab-count-badge').innerText = total;
        const container = document.getElementById('history-container'); container.innerHTML = "";
        
        if(total === 0) {
            container.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px;">Nadie ha ingresado todavía a esta función 🎭</div>`;
            return;
        }
        
        boletosRegistrados.forEach(b => { 
            container.innerHTML += `<div class="history-item"><span>✅ Boleto <b>#${b}</b> - En la sala</span></div>`; 
        });
    }

    function reiniciarTodoCloud() {
        if (confirm(`🚨 ¿Limpiar todas las asistencias de la ${funcionActual} en Google Sheets?`)) {
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ accion: "limpiar", funcion: funcionActual })
            }).then(() => {
                boletosRegistrados.clear(); actualizarInterfazTaquilla();
            });
        }
    }

    function procesarBoletoManual() { const input = document.getElementById('ticket-input'); registrarBoleto(input.value); input.value = ""; input.focus(); }
    document.getElementById('ticket-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') procesarBoletoManual(); });
    function reproducirSonidoError() { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(130, ctx.currentTime); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); }
    
    function onScanSuccess(decodedText) { 
        registrarBoleto(decodedText);
        // Pequeña pausa para evitar lecturas fantasmas seguidas en papel corto
        setTimeout(() => { if(window.html5QrcodeScanner) { inicializarEscaner(); } }, 1200);
    }

    function inicializarEscaner() { 
        document.getElementById('btn-encender-camara').style.display = "none"; 
        window.html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 30, // Mayor velocidad de procesamiento
            qrbox: { width: 280, height: 280 }, // Recuadro más grande para enfocar de cerca papel pequeño
            videoConstraints: {
                width: { ideal: 1920 }, // Obligar resolución HD para máximo detalle de líneas QR
                height: { ideal: 1080 },
                facingMode: "environment"
            },
            rememberLastUsedCamera: true 
        }); 
        html5QrcodeScanner.render(onScanSuccess, () => {}); 
    }
</script>
</body>
</html>
