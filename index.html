<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALBROTE PRO | Sistema de Taquilla Integral</title>
    <!-- Librerías Originales + Soporte de Iconos -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* ESTÉTICA INTEGRAL MALBROTE TEATRO (Oscuro, Elegante, Profesional) */
        :root {
            --bg-principal: #0d0f14;
            --bg-card: #171e2e;
            --bg-input: #1e293b;
            --rojo-malbrote: #601919;
            --rojo-brillante: #ad1a24;
            --accent-canva: #38bdf8;
            --texto-blanco: #f8fafc;
            --texto-gris: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background-color: var(--bg-principal); 
            color: var(--texto-blanco); 
            padding: 15px; 
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        h1 { 
            color: var(--texto-blanco); 
            margin-bottom: 15px; 
            font-size: 26px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--rojo-malbrote);
            padding-bottom: 10px;
        }

        /* BARRA DE CONFIGURACIÓN */
        .config-bar { 
            background: #0f172a; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            border: 1px solid var(--rojo-malbrote); 
            font-weight: bold; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        select { 
            padding: 8px 16px; 
            font-size: 14px; 
            border-radius: 6px; 
            border: 1px solid var(--rojo-malbrote); 
            font-weight: bold; 
            color: white; 
            background: var(--bg-input);
            cursor: pointer;
        }

        /* NAVEGACIÓN POR PESTAÑAS */
        .tabs { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #1e293b; 
        }

        .tab-btn { 
            background: none; 
            border: none; 
            padding: 12px 10px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            color: var(--texto-gris); 
            flex: 1; 
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab-btn:hover { color: var(--texto-blanco); }
        .tab-btn.active { 
            color: var(--rojo-brillante); 
            border-bottom: 3px solid var(--rojo-brillante); 
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CONTADORES Y BOTONES */
        .counter-box { 
            background: var(--rojo-malbrote); 
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 22px; 
            font-weight: bold; 
            margin: 15px 0; 
            border: 1px solid var(--rojo-brillante);
        }

        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .input-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
        
        input[type="text"], input[type="number"] { 
            padding: 12px; 
            background: var(--bg-input);
            border: 1px solid #334155; 
            border-radius: 8px; 
            font-size: 16px; 
            color: white;
            width: 100%;
        }
        input[type="text"]:focus { border-color: var(--rojo-brillante); outline: none; }

        button { 
            padding: 12px 24px; 
            background: var(--rojo-malbrote); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.2s;
        }
        button:hover { background: var(--rojo-brillante); }
        
        .btn-camera { background: #4f46e5; width: 100%; margin-bottom: 12px; padding: 14px; }
        .btn-camera:hover { background: #4338ca; }
        .btn-file { background: #ea580c; width: 100%; margin-bottom: 15px; padding: 14px; font-size: 16px; color: white; border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer; display: block; }
        .btn-file:hover { background: #c2410c; }
        .btn-sync { background: #2563eb; width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px; }
        .btn-sync:hover { background: #1d4ed8; }
        .btn-reset { background: #475569; margin-top: 25px; width: 100%; }
        .btn-reset:hover { background: #334155; }

        /* ESCÁNER: DISEÑO COMPACTO */
        #reader { width: 100%; max-width: 320px; margin: 0 auto 15px auto; border-radius: 12px; overflow: hidden; background: #0f172a; border: 2px solid var(--rojo-malbrote); }
        #reader video { object-fit: cover !important; height: 260px !important; }

        /* SECCIÓN DE ASISTENCIA */
        .history-list { text-align: left; background: #0f172a; padding: 15px; border-radius: 10px; max-height: 300px; overflow-y: auto; margin-top: 15px; border: 1px solid #1e293b; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #1e293b; font-size: 15px; }
        
        /* WORKSPACE GENERADOR MEJORADO ESTILO CANVA */
        .editor-layout { display: flex; flex-direction: column; gap: 20px; width: 100%; align-items: stretch; }
        @media (min-width: 850px) { .editor-layout { flex-direction: row; } }

        .canva-sidebar { background: #0f172a; padding: 20px; border-radius: 12px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #1e293b; }
        .canva-sidebar h4 { font-size: 14px; color: var(--accent-canva); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        .slider-control { display: flex; flex-direction: column; gap: 5px; width: 100%; text-align: left; }
        .slider-control label { font-size: 13px; color: var(--texto-gris); }
        .slider-control input[type="range"] { width: 100%; accent-color: var(--accent-canva); cursor: pointer; }

        /* LIENZO INTERACTIVO CON ADAPTABILIDAD AUTOMÁTICA Y CUADRÍCULA */
        .canva-viewport { 
            flex-grow: 1; 
            background: #090d16; 
            border-radius: 12px; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: auto; 
            position: relative; 
            min-height: 450px;
            border: 2px dashed #1e293b;
        }

        /* Cuadrícula de alineación estilo Canva */
        .canva-grid {
            position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;
            background-image: linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* LÍNEAS GUÍA INTELIGENTES (Aparecen al arrastrar) */
        .guide-line { position: absolute; background-color: #f43f5e; z-index: 10; display: none; pointer-events: none; }
        .guide-x { width: 100%; height: 1px; left: 0; }
        .guide-y { height: 100%; width: 1px; top: 0; }

        .ticket-canvas-container { 
            position: relative; 
            display: inline-block; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .ticket-bg-preview { display: block; max-width: 100%; height: auto; }

        /* BLOQUE DE DISEÑO DEL QR COMPACTO (Como tu imagen) */
        .qr-canva-block {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            border: 2px dashed #b5c2d1;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .qr-canva-text {
            color: #111a2e;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            word-wrap: break-word;
            font-family: sans-serif;
            margin-bottom: 10px;
        }

        .qr-canva-zone { width: 100%; display: flex; justify-content: center; align-items: center; }
        .qr-canva-zone img { width: 100% !important; height: auto !important; display: block; }

        /* SALIDA DEL LOTE ABAJO */
        #qr-output { margin-top: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 450px; overflow-y: auto; padding: 15px; border: 1px solid #1e293b; border-radius: 10px; background: #0f172a; }
        .ticket-batch-card { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .batch-download-btn { padding: 6px 12px; font-size: 12px; background: #2563eb; width: 100%; }

        /* VENTANA POP-UP MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: var(--bg-card); padding: 30px 20px; border-radius: 16px; max-width: 400px; width: 100%; box-shadow: 0 15px 30px rgba(0,0,0,0.5); text-align: center; animation: popEffect 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popEffect { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }
        .modal-message { font-size: 16px; margin-bottom: 25px; color: var(--texto-gris); line-height: 1.5; }
        .modal-btn { width: 100%; padding: 12px; font-size: 16px; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Estados del Pop-up */
        .pop-success { border: 3px solid #16a34a; background-color: #052e16; }
        .pop-success .modal-title { color: #4ade80; }
        .pop-success .modal-btn { background: #16a34a; }
        .pop-danger { border: 3px solid #ef4444; background-color: #450a0a; }
        .pop-danger .modal-title { color: #f87171; }
        .pop-danger .modal-btn { background: #ef4444; }
        .pop-loading { border: 3px solid #eab308; background-color: #422006; }
        .pop-loading .modal-title { color: #fde047; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎭 Control de Teatro (v5.5-Pro)</h1>
    
    <div class="config-bar">
        🎬 Sala Activa: 
        <select id="funcion-activa" onchange="cambiarFuncionSecura()">
            <option value="FUNCIÓN 1">FUNCIÓN 1</option>
            <option value="FUNCIÓN 2">FUNCIÓN 2</option>
        </select>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-generador')">🎟️ Crear (Canva Style)</button>
        <button class="tab-btn" onclick="switchTab('tab-escaner')">📷 Escáner</button>
        <button class="tab-btn" onclick="switchTab('tab-asistencia')">📊 Dentro (<span id="tab-count-badge">0</span>)</button>
    </div>

    <!-- PESTAÑA 1: GENERADOR CANVA INTEGRADO -->
    <div id="tab-generador" class="tab-content active">
        <div class="editor-layout">
            
            <!-- Barra Lateral de Controles -->
            <div class="canva-sidebar">
                <h4>1. Ajustes del Lote</h4>
                <div class="input-row" style="flex-direction: column; width: 100%; gap: 8px;">
                    <input type="text" id="qr-prefix" placeholder="Prefijo (Ej: OBRALUNES)" autocomplete="off">
                    <input type="number" id="qr-quantity" min="1" max="500" value="156" style="width: 100%;">
                </div>

                <h4>2. Cargar Fondo Fiel</h4>
                <input type="file" id="canva-bg-input" accept="image/*" style="color: white; font-size: 13px;">

                <h4>3. Herramientas Crop / Escala</h4>
                <div class="slider-control">
                    <label>Ancho Bloque Blanco (Crop Exterior):</label>
                    <input type="range" id="slider-block-width" min="140" max="400" value="220">
                </div>
                <div class="slider-control">
                    <label>Margen Interno (Crop QR):</label>
                    <input type="range" id="slider-block-padding" min="5" max="30" value="15">
                </div>
                <div class="slider-control">
                    <label>Tamaño Fuente Título:</label>
                    <input type="range" id="slider-font-size" min="10" max="22" value="14">
                </div>

                <button style="width: 100%; margin-top: 10px; background: var(--accent-canva); color: black;" onclick="generarLoteBoletos()">⚡ Procesar y Crear Lote</button>
            </div>

            <!-- Espacio de Trabajo del Lienzo -->
            <div class="canva-viewport" id="viewport">
                <div class="canva-grid"></div>
                
                <!-- Líneas Guía -->
                <div class="guide-line guide-x" id="guide-x"></div>
                <div class="guide-line guide-y" id="guide-y"></div>

                <div class="ticket-canvas-container" id="ticketCanvasContainer">
                    <!-- Imagen de fondo base responsiva -->
                    <img id="canva-ticket-bg" class="ticket-bg-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='750' height='420'><rect width='750' height='420' fill='%231e293b'/><text x='50%' y='50%' fill='%2364748b' font-family='sans-serif' font-size='18' text-anchor='middle'>Sube el diseño de tu boleto aquí</text></svg>">
                    
                    <!-- Bloque del QR Arrastrable con la estética que mandaste -->
                    <div class="qr-canva-block" id="interactiveQrBlock">
                        <div class="qr-canva-text" id="canvaTextPreview">Boleto Oficial: PREFIJO001</div>
                        <div id="canva-qrcode-target" class="qr-canva-zone"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="qr-output" style="display:none;"></div>
    </div>

    <!-- PESTAÑA 2: ESCÁNER (LOGICA COMPLETA DE FOTOS + MANUAL) -->
    <div id="tab-escaner" class="tab-content">
        <div class="counter-box">Asistentes en Sala: <span id="total-count">0</span></div>
        
        <button class="btn-camera" id="btn-encender-camara" onclick="inicializarEscaner()">📷 Modo 1: Abrir Cámara Compacta</button>
        <div id="reader"></div>

        <label for="qr-file-input" class="btn-file">📸 Modo 2: Tomar Foto de Boleto</label>
        <input type="file" id="qr-file-input" accept="image/*" style="display: none;" onchange="escanearDesdeArchivo(this)">

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="ticket-input" placeholder="Número manual..." autocomplete="off">
                <button onclick="procesarBoletoManual()">Ingresar</button>
            </div>
        </div>
    </div>

    <!-- PESTAÑA 3: ASISTENCIA GLOBAL CLOUD -->
    <div id="tab-asistencia" class="tab-content">
        <h3>👥 Personas Adentro (Sincronizado)</h3>
        <button class="btn-sync" onclick="sincronizarConNube()">🔄 Sincronizar Lista Cloud</button>
        <div class="history-list" id="history-container"></div>
        <button class="btn-reset" onclick="reiniciarTodoCloud()">🧹 Limpiar Pruebas de esta Función</button>
    </div>
</div>

<!-- VENTANA POP-UP DE RESULTADOS (MODAL) -->
<div id="result-modal" class="modal-overlay">
    <div id="modal-content-box" class="modal-box">
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-message" class="modal-message"></div>
        <button id="modal-btn" class="modal-btn" onclick="cerrarPopUp()">ENTENDIDO / SIGUIENTE</button>
    </div>
</div>

<script>
    // ==========================================
    // ¡PEGA TU URL DE APPS SCRIPT AQUÍ ABAJO!
    // ==========================================
    const WEB_APP_URL = "AQUÍ_PEGA_TU_URL_DE_GOOGLE";

    let funcionActual = document.getElementById('funcion-activa').value;
    let boletosRegistrados = new Set();
    let ultimoCodigoEscaneado = "";
    let tiempoUltimoEscaneo = 0;
    let html5Qrcode = null; 
    
    // Coordenadas relativas en % para replicar en el lote
    let relLeftPct = 5;
    let relTopPct = 5;

    sincronizarConNube();

    // --- MANEJO DE VENTANAS MODALES ---
    function mostrarPopUp(tipo, titulo, mensaje) {
        const modal = document.getElementById('result-modal');
        const box = document.getElementById('modal-content-box');
        const titleEl = document.getElementById('modal-title');
        const msgEl = document.getElementById('modal-message');
        const btn = document.getElementById('modal-btn');

        box.className = "modal-box " + tipo;
        titleEl.innerText = titulo;
        msgEl.innerHTML = mensaje;
        
        if (tipo === 'pop-loading') {
            btn.style.display = "none";
        } else {
            btn.style.display = "block";
            btn.focus();
        }
        modal.style.display = "flex";
    }

    function cerrarPopUp() { document.getElementById('result-modal').style.display = "none"; }

    function cambiarFuncionSecura() {
        funcionActual = document.getElementById('funcion-activa').value;
        boletosRegistrados.clear();
        cerrarPopUp();
        sincronizarConNube();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        if (tabId === 'tab-asistencia') sincronizarConNube();
        if (tabId !== 'tab-escaner' && html5Qrcode) {
            html5Qrcode.stop().then(() => {
                document.getElementById('btn-encender-camara').style.display = "block";
            }).catch(err => console.log(err));
        }
    }

    // --- COMPORTAMIENTO DEL EDITOR MULTI-MEDIDA (CANVA STYLE) ---
    const canvaBgInput = document.getElementById('canva-bg-input');
    const canvaTicketBg = document.getElementById('canva-ticket-bg');
    const interactiveQrBlock = document.getElementById('interactiveQrBlock');
    const ticketCanvasContainer = document.getElementById('ticketCanvasContainer');
    
    // Sliders de Modificación Visual
    const slWidth = document.getElementById('slider-block-width');
    const slPadding = document.getElementById('slider-block-padding');
    const slFont = document.getElementById('slider-font-size');
    const canvaTextPreview = document.getElementById('canvaTextPreview');

    // Inicializar QR de previsualización interactiva
    let previewQr = new QRCode(document.getElementById("canva-qrcode-target"), {
        text: "PREVISUALIZACION",
        width: 150,
        height: 150,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // Actualizar dinámicamente propiedades mediante los sliders
    function aplicarAjustesLienzo() {
        interactiveQrBlock.style.width = `${slWidth.value}px`;
        interactiveQrBlock.style.padding = `${slPadding.value}px`;
        canvaTextPreview.style.fontSize = `${slFont.value}px`;
    }

    slWidth.addEventListener('input', aplicarAjustesLienzo);
    slPadding.addEventListener('input', aplicarAjustesLienzo);
    slFont.addEventListener('input', aplicarAjustesLienzo);
    
    document.getElementById('qr-prefix').addEventListener('input', (e) => {
        canvaTextPreview.textContent = `Boleto Oficial: ${e.target.value.toUpperCase()}001`;
    });

    // Cargar imagen de fondo personalizada sin deformarla
    canvaBgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                canvaTicketBg.src = event.target.result;
                // Re-inicializar coordenadas al centro superior
                interactiveQrBlock.style.left = "20px";
                interactiveQrBlock.style.top = "20px";
                relLeftPct = (20 / ticketCanvasContainer.clientWidth) * 100;
                relTopPct = (20 / ticketCanvasContainer.clientHeight) * 100;
            };
            reader.readAsDataURL(file);
        }
    });

    // SISTEMA DRAG & DROP CON GUÍAS IMANTADAS ESTILO CANVA
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;
    const guideX = document.getElementById('guide-x');
    const guideY = document.getElementById('guide-y');

    interactiveQrBlock.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        initialLeft = interactiveQrBlock.offsetLeft;
        initialTop = interactiveQrBlock.offsetTop;
        
        guideX.style.display = 'block';
        guideY.style.display = 'block';

        document.addEventListener('mousemove', dragMoveCanva);
        document.addEventListener('mouseup', dragEndCanva);
    });

    function dragMoveCanva(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        let newLeft = initialLeft + dx;
        let newTop = initialTop + dy;

        const containerW = ticketCanvasContainer.clientWidth;
        const containerH = ticketCanvasContainer.clientHeight;
        const blockW = interactiveQrBlock.clientWidth;
        const blockH = interactiveQrBlock.clientHeight;

        // Límites
        newLeft = Math.max(0, Math.min(newLeft, containerW - blockW));
        newTop = Math.max(0, Math.min(newTop, containerH - blockH));

        // DETECCIÓN DE CORTES CENTRALES (Eje Magnético)
        const centroContenedorX = containerW / 2;
        const centroBloqueX = newLeft + (blockW / 2);
        if (Math.abs(centroBloqueX - centroContenedorX) < 10) {
            newLeft = centroContenedorX - (blockW / 2); // Imán
            guideY.style.backgroundColor = '#22c55e'; // Línea verde
        } else {
            guideY.style.backgroundColor = '#f43f5e';
        }

        const centroContenedorY = containerH / 2;
        const centroBloqueY = newTop + (blockH / 2);
        if (Math.abs(centroBloqueY - centroContenedorY) < 10) {
            newTop = centroContenedorY - (blockH / 2); // Imán
            guideX.style.backgroundColor = '#22c55e';
        } else {
            guideX.style.backgroundColor = '#f43f5e';
        }

        // Posicionar Líneas Guías Relativas al Viewport
        const rectContainer = ticketCanvasContainer.getBoundingClientRect();
        const rectViewport = document.getElementById('viewport').getBoundingClientRect();
        
        guideY.style.left = `${rectContainer.left - rectViewport.left + newLeft + (blockW / 2)}px`;
        guideX.style.top = `${rectContainer.top - rectViewport.top + newTop + (blockH / 2)}px`;

        interactiveQrBlock.style.left = `${newLeft}px`;
        interactiveQrBlock.style.top = `${newTop}px`;

        // Guardar porcentajes para reproducirlos exactamente en el lote final
        relLeftPct = (newLeft / containerW) * 100;
        relTopPct = (newTop / containerH) * 100;
    }

    function dragEndCanva() {
        isDragging = false;
        guideX.style.display = 'none';
        guideY.style.display = 'none';
        document.removeEventListener('mousemove', dragMoveCanva);
        document.removeEventListener('mouseup', dragEndCanva);
    }

    // --- GENERADOR DE LOTES EN MASA CON RENDERIZADO EXCLUSIVO ---
    function generarLoteBoletos() {
        const prefixInput = document.getElementById('qr-prefix').value.trim().toUpperCase();
        const quantityInput = parseInt(document.getElementById('qr-quantity').value, 10);
        const outputContainer = document.getElementById('qr-output');

        if (!prefixInput) { alert("Ingresa un prefijo oficial."); return; }
        if (isNaN(quantityInput) || quantityInput < 1 || quantityInput > 500) { alert("Cantidad de 1 a 500."); return; }

        outputContainer.innerHTML = "";
        outputContainer.style.display = "grid";

        mostrarPopUp('pop-loading', '⚙️ Generando lote...', `Construyendo ${quantityInput} boletos con el layout configurado...`);

        // Iterar la cantidad solicitada
        for (let i = 1; i <= quantityInput; i++) {
            const numeroTicket = String(i).padStart(3, '0');
            const textoLimpio = `${prefixInput}${numeroTicket}`;
            const tokenCifradoBase64 = btoa(`TEATRO-SECURE:${textoLimpio}`);

            // Estructurar el clon exacto del Canvas para render
            const batchCard = document.createElement('div');
            batchCard.className = 'ticket-batch-card';

            const canvasWrapper = document.createElement('div');
            canvasWrapper.className = 'ticket-canvas-container';
            canvasWrapper.id = `render-container-${numeroTicket}`;

            // Clonar la imagen de fondo
            const imgBgClon = document.createElement('img');
            imgBgClon.className = 'ticket-bg-preview';
            imgBgClon.src = canvaTicketBg.src;
            canvasWrapper.appendChild(imgBgClon);

            // Recrear el Bloque Blanco QR con posiciones relativas exactas
            const blockClon = document.createElement('div');
            blockClon.className = 'qr-canva-block';
            blockClon.style.width = `${slWidth.value}px`;
            blockClon.style.padding = `${slPadding.value}px`;
            blockClon.style.left = `${relLeftPct}%`;
            blockClon.style.top = `${relTopPct}%`;

            const textClon = document.createElement('div');
            textClon.className = 'qr-canva-text';
            textClon.style.fontSize = `${slFont.value}px`;
            textClon.textContent = `Boleto Oficial: ${textoLimpio}`;

            const qrZoneClon = document.createElement('div');
            qrZoneClon.id = `final-qr-${numeroTicket}`;
            qrZoneClon.className = 'qr-canva-zone';

            blockClon.appendChild(textClon);
            blockClon.appendChild(qrZoneClon);
            canvasWrapper.appendChild(blockClon);

            // Botón independiente de descarga
            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'batch-download-btn';
            downloadBtn.innerText = `💾 Guardar #${numeroTicket}`;
            downloadBtn.onclick = function() {
                exportarCanvasAImagen(`render-container-${numeroTicket}`, `Boleto_${textoLimpio}`);
            };

            batchCard.appendChild(canvasWrapper);
            batchCard.appendChild(downloadBtn);
            outputContainer.appendChild(batchCard);

            // Inyectar QR real dentro del clon
            new QRCode(document.getElementById(`final-qr-${numeroTicket}`), {
                text: tokenCifradoBase64,
                width: parseInt(slWidth.value) - (parseInt(slPadding.value) * 2),
                height: parseInt(slWidth.value) - (parseInt(slPadding.value) * 2),
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
        
        aplicarAjustesLienzo();
        setTimeout(cerrarPopUp, 1000);
    }

    function exportarCanvasAImagen(containerId, filename) {
        const elemento = document.getElementById(containerId);
        html2canvas(elemento, { scale: 3, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${filename}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // --- LÓGICA CORE: CONTROL DE ASISTENCIA Y TRANSMISIÓN A CLOUD ---
    function desencriptarToken(token) {
        try {
            let decodificado = atob(token.trim());
            if(decodificado.startsWith("TEATRO-SECURE:")) return decodificado.replace("TEATRO-SECURE:", "");
            return token.toUpperCase();
        } catch(e) { return token.toUpperCase(); }
    }

    function extraerNumero(codigo) {
        let coincidencia = codigo.match(/\d+$/);
        return coincidencia ? parseInt(coincidencia[0], 10) : null;
    }

    function registrarBoleto(codigoBruto) {
        let codigoReal = desencriptarToken(codigoBruto);
        let numBoleto = extraerNumero(codigoReal);
        
        mostrarPopUp('pop-loading', '⏳ Validando...', `Cotejando boleto <b>[${codigoReal}]</b> con la base de datos central...`);

        // Validación global del rango impreso
        if (!numBoleto || numBoleto < 1 || numBoleto > 156) {
            mostrarPopUp('pop-danger', '❌ CÓDIGO INVÁLIDO', `El código <b>[${codigoReal}]</b> no corresponde a ningún boleto del rango 001 al 156.`);
            reproducirSonidoError(); return;
        }

        // Validación estricta de Función asignada
        if (funcionActual === "FUNCIÓN 1" && numBoleto > 78) {
            mostrarPopUp('pop-danger', '⚠️ FUNCIÓN EQUIVOCADA', `El boleto <b>#${numBoleto}</b> es de la <b>FUNCIÓN 2</b>.<br><br>Indique al usuario que espere su horario.`);
            reproducirSonidoError(); return;
        }
        if (funcionActual === "FUNCIÓN 2" && numBoleto <= 78) {
            mostrarPopUp('pop-danger', '⚠️ FUNCIÓN EQUIVOCADA', `El boleto <b>#${numBoleto}</b> pertenece a la <b>FUNCIÓN 1</b> (Horario concluido).`);
            reproducirSonidoError(); return;
        }

        if (boletosRegistrados.has(String(numBoleto).padStart(3, '0'))) {
            mostrarPopUp('pop-danger', '🚨 ENTRADA YA USADA', `El boleto <b>#${numBoleto}</b> ya cruzó la puerta de acceso.<br><br><b>¡Alerta de duplicado!</b>`);
            reproducirSonidoError(); return;
        }

        // Post directo a Google Apps Script
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accion: "registrar", codigo: codigoReal, funcion: funcionActual })
        }).then(() => {
            mostrarPopUp('pop-success', '🎉 ¡ACCESO PERMITIDO!', `Boleto <b>#${numBoleto}</b> validado perfectamente.<br><br>¡Disfrute la obra!`);
            sincronizarConNube();
        }).catch(() => {
            mostrarPopUp('pop-danger', '❌ ERROR DE CONEXIÓN', `La verificación falló debido a problemas de red.`);
        });
    }

    function sincronizarConNube() {
        const badge = document.getElementById('tab-count-badge');
        badge.innerText = "...";
        
        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({ accion: "obtener_asistencia", funcion: funcionActual })
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "success") {
                boletosRegistrados = new Set(res.lista);
                actualizarInterfazTaquilla();
            }
        }).catch(() => {
            badge.innerText = boletosRegistrados.size;
        });
    }

    function actualizarInterfazTaquilla() {
        let total = boletosRegistrados.size;
        document.getElementById('total-count').innerText = total;
        document.getElementById('tab-count-badge').innerText = total;
        const container = document.getElementById('history-container'); 
        container.innerHTML = "";
        
        if(total === 0) {
            container.innerHTML = `<div style="text-align:center; color:#64748b; padding:20px;">Sin ingresos registrados para esta sala 🎭</div>`;
            return;
        }
        
        boletosRegistrados.forEach(b => { 
            container.innerHTML += `<div class="history-item"><span>✅ Entrada Confirmada: <b>Boleto #${b}</b></span></div>`; 
        });
    }

    function reiniciarTodoCloud() {
        if (confirm(`🚨 ¿Vaciar el histórico completo de la ${funcionActual} en Google Sheets?`)) {
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ accion: "limpiar", funcion: funcionActual })
            }).then(() => {
                boletosRegistrados.clear(); 
                actualizarInterfazTaquilla();
            });
        }
    }

    function escanearDesdeArchivo(input) {
        if (input.files.length === 0) return;
        mostrarPopUp('pop-loading', '⏳ Leyendo Imagen...', 'Procesando archivo cargado...');

        const fileHtml5Qrcode = new Html5Qrcode("reader");
        fileHtml5Qrcode.scanFile(input.files[0], true)
            .then(decodedText => {
                registrarBoleto(decodedText);
                input.value = "";
            })
            .catch(err => {
                mostrarPopUp('pop-danger', '❌ QR INDETECTABLE', 'No se ubicó un QR válido. Tome la captura de frente y con buena luz.');
                reproducirSonidoError();
                input.value = "";
            });
    }

    function procesarBoletoManual() { 
        const input = document.getElementById('ticket-input'); 
        registrarBoleto(input.value); 
        input.value = ""; 
    }
    
    document.getElementById('ticket-input').addEventListener('keypress', function(e) { 
        if (e.key === 'Enter') { procesarBoletoManual(); } 
    });
    
    function reproducirSonidoError() { 
        const ctx = new (window.AudioContext || window.webkitAudioContext)(); 
        const osc = ctx.createOscillator(); 
        osc.type = 'sawtooth'; 
        osc.frequency.setValueAtTime(130, ctx.currentTime); 
        osc.connect(ctx.destination); 
        osc.start(); 
        osc.stop(ctx.currentTime + 0.3); 
    }
    
    function onScanSuccess(decodedText) { 
        let ahora = Date.now();
        if (decodedText === ultimoCodigoEscaneado && (ahora - tiempoUltimoEscaneo) < 3000) return; 
        ultimoCodigoEscaneado = decodedText;
        tiempoUltimoEscaneo = ahora;
        registrarBoleto(decodedText);
    }

    function inicializarEscaner() { 
        document.getElementById('btn-encender-camara').style.display = "none";
        html5Qrcode = new Html5Qrcode("reader");
        html5Qrcode.start(
            { facingMode: "environment" }, 
            { fps: 20, qrbox: { width: 230, height: 230 } },
            onScanSuccess,
            () => {}
        ).catch(err => {
            document.getElementById('btn-encender-camara').style.display = "block";
            alert("Acceso continuo a cámara denegado. Utiliza el Modo 2.");
        });
    }

    // Inicialización visual por defecto
    aplicarAjustesLienzo();
</script>
