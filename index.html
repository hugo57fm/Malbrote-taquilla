<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Automático de Boletos</title>
    <!-- Cargamos la librería externa de códigos QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="range"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #219150;
        }
        /* --- ESTILO DE TU BOLETO MAESTRO --- */
        .ticket-preview {
            background-color: #1a1a1a; /* Fondo oscuro elegante */
            color: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            position: relative;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
            border: 2px solid #333;
            text-align: center;
        }
        /* Ajustes tipográficos para que coincida exactamente con tus ventas previas */
        .ticket-title {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 24px;
            color: #f1c40f; /* Color dorado/amarillo oficial */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        /* Contenedor especial para recortar/hacer zoom al QR */
        .qr-crop-container {
            width: 130px;
            height: 130px;
            margin: 0 auto;
            overflow: hidden; /* Recorta todo lo que se salga del recuadro */
            position: relative;
            background: white;
            border-radius: 4px;
        }
        /* El código QR real interno */
        .qr-crop-container #qrcode img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.2); /* Control de escala por defecto */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Panel del Generador Automático</h2>
        <div class="form-group">
            <label for="nombreAsistente">Nombre del Asistente (Ejemplo de Plantilla):</label>
            <input type="text" id="nombreAsistente" placeholder="Juan Pérez">
        </div>
        
        <hr>
        <h3>Herramienta de Recorte de QR</h3>
        <p style="font-size:12px; color:#666;">Ajusta los deslizadores si notas espacio en blanco innecesario alrededor del código QR.</p>
        
        <div class="form-group">
            <label>Tamaño / Zoom del QR:</label>
            <input type="range" id="qrZoom" min="1" max="2.5" step="0.1" value="1.3">
        </div>
        <button id="btnGenerar">Generar Boleto Automáticamente</button>
    </div>

    <!-- VISTA PREVIA EN VIVO DE TU BOLETO DE EJEMPLO -->
    <div class="ticket-preview">
        <!-- El título se renderizará automáticamente idéntico a los anteriores -->
        <div class="ticket-title" id="previewTitle">Boleto Oficial: SIN HOGAR-001</div>
        
        <!-- Contenedor con máscara de recorte -->
        <div class="qr-crop-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        // ⚠️ REMPLAZA ESTA URL CON EL ENLACE DE TU NUEVA IMPLEMENTACIÓN DE APPS SCRIPT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzqiah0ZY9FCbpiEMmEEmkAQJBkBsn4SEgHRIOKwuyk0XSrq03bJ59XROJVpNLRp60/exec";

        const qrContainer = document.getElementById("qrcode");
        const qrZoom = document.getElementById("qrZoom");
        const previewTitle = document.getElementById("previewTitle");
        const btnGenerar = document.getElementById("btnGenerar");
        
        // Inicializar un código QR básico de muestra en la plantilla maestra
        let qrInstancia = new QRCode(qrContainer, {
            text: "Boleto Oficial: SIN HOGAR-001",
            width: 130,
            height: 130,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Función dinámica para aplicar el recorte/zoom visual al QR al mover el control
        function actualizarRecorteQR() {
            const img = qrContainer.querySelector("img");
            if(img) {
                img.style.transform = `translate(-50%, -50%) scale(${qrZoom.value})`;
            }
        }

        qrZoom.addEventListener("input", actualizarRecorteQR);
        // Pequeño retardo para asegurar que la imagen del QR cargó al inicio
        setTimeout(actualizarRecorteQR, 500);

        // Envío e integración masiva automática
        btnGenerar.addEventListener("click", function() {
            const nombre = document.getElementById("nombreAsistente").value.trim();
            if(!nombre) {
                alert("Por favor introduce un nombre para procesar la acción automatizada.");
                return;
            }

            btnGenerar.innerText = "Procesando en Spreadsheet...";
            btnGenerar.disabled = true;

            // Enviamos el trigger hacia Google Apps Script
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Evita bloqueos de seguridad del navegador comunes
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ nombre: nombre })
            })
            .then(() => {
                alert("¡Boleto procesado correctamente! Se ha añadido de forma 100% automática a tu Google Sheet.");
                btnGenerar.innerText = "Generar Boleto Automáticamente";
                btnGenerar.disabled = false;
            })
            .catch(err => {
                console.error(err);
                alert("Ocurrió un inconveniente al enviar la información automatizada.");
                btnGenerar.innerText = "Generar Boleto Automáticamente";
                btnGenerar.disabled = false;
            });
        });
    </script>
</body>
</html>
